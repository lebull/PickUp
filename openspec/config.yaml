schema: spec-driven

context: |
  Tech stack: TypeScript, React, Vite, Vitest, @testing-library/react.
  Domain: DJ lineup scheduling app for multi-stage events. Core surfaces are the LineupGrid and DJSelectionPanel.

  UI scope rule: simultaneous-stage surfaces are ALWAYS in scope alongside their sequential equivalents.
  Never exclude simultaneous grid cells, simultaneous slot-tray rows, or simultaneous panel positions as
  "follow-on" or "out of scope" work — treat them as co-equal with sequential variants in every feature.

